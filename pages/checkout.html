<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Amber Recliners</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Theme Script (Inline to prevent FOUC) -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>

<body>
    <!-- SIMPLE HEADER FOR CHECKOUT (To reduce distractions) -->
    <header class="main-header" style="padding: 20px 0; border-bottom: 1px solid var(--border-light);">
        <div class="container text-center">
            <a href="../index.html">
                <img src="../assets/images/cropped-Recliners-India-Black.png" alt="Recliners India Logo" style="height: 40px;">
            </a>
        </div>
    </header>

    <section class="checkout-section section-padding">
        <div class="container checkout-layout">
            
            <div class="checkout-form-container">
                <h2 style="font-family: var(--font-sans); font-size: 1.5rem; margin-bottom: 32px;">Checkout</h2>

                <form id="checkoutForm">
                    <!-- Step 1: Contact -->
                    <div class="checkout-step active">
                        <div class="step-header">
                            <span class="step-num">1</span>
                            <h3>Contact Information</h3>
                        </div>
                        <div class="step-content">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" required placeholder="Enter your email">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Phone Number</label>
                                    <input type="tel" required placeholder="+91">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Shipping -->
                    <div class="checkout-step active">
                        <div class="step-header">
                            <span class="step-num">2</span>
                            <h3>Shipping Address</h3>
                        </div>
                        <div class="step-content">
                            <div class="form-row split">
                                <div class="form-group">
                                    <label>First Name</label>
                                    <input type="text" required>
                                </div>
                                <div class="form-group">
                                    <label>Last Name</label>
                                    <input type="text" required>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Street Address</label>
                                    <input type="text" required>
                                </div>
                            </div>
                            <div class="form-row split">
                                <div class="form-group">
                                    <label>City</label>
                                    <input type="text" required>
                                </div>
                                <div class="form-group">
                                    <label>State</label>
                                    <select required>
                                        <option value="">Select State</option>
                                        <option value="DL">Delhi</option>
                                        <option value="MH">Maharashtra</option>
                                        <option value="KA">Karnataka</option>
                                        <option value="TN">Tamil Nadu</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>PIN Code</label>
                                    <input type="text" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 3: Payment -->
                    <div class="checkout-step active">
                        <div class="step-header">
                            <span class="step-num">3</span>
                            <h3>Payment Options</h3>
                        </div>
                        <div class="step-content">
                            <div class="payment-methods">
                                <label class="payment-method">
                                    <input type="radio" name="payment" value="razorpay" checked>
                                    <span class="method-box">
                                        <i class="ph ph-credit-card"></i>
                                        Credit Card / UPI / Netbanking (Razorpay)
                                    </span>
                                </label>
                                <label class="payment-method">
                                    <input type="radio" name="payment" value="emi">
                                    <span class="method-box">
                                        <i class="ph ph-bank"></i>
                                        No Cost EMI Options
                                    </span>
                                </label>
                            </div>
                            
                            <div class="mock-card-form">
                                <div class="form-group">
                                    <label>Card Number</label>
                                    <input type="text" placeholder="XXXX XXXX XXXX XXXX">
                                </div>
                                <div class="form-row split">
                                    <div class="form-group">
                                        <label>Expiry Date</label>
                                        <input type="text" placeholder="MM/YY">
                                    </div>
                                    <div class="form-group">
                                        <label>CVV</label>
                                        <input type="text" placeholder="123">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-large w-100 mt-4" style="width: 100%; margin-top: 24px;">
                                <i class="ph ph-lock-key"></i> Pay Securely
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Order Summary Sidebar -->
            <div class="checkout-summary" id="checkoutSummaryPanel">
                <h3 style="margin-bottom: 24px; font-size: 1.125rem;">Order Summary</h3>
                <div id="checkoutItemsList" class="checkout-items-list">
                    <!-- Items rendered via JS -->
                </div>
                
                <div class="summary-divider"></div>
                
                <div class="summary-row">
                    <span class="text-gray">Subtotal</span>
                    <span id="checkoutSubtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span class="text-gray">Shipping</span>
                    <span id="checkoutShipping">₹0</span>
                </div>
                
                <div class="summary-divider"></div>
                
                <div class="summary-row grand-total">
                    <span>Total</span>
                    <span id="checkoutTotal">₹0</span>
                </div>
            </div>

        </div>
    </section>

    <!-- Success Modal -->
    <div class="success-overlay" id="successModal">
        <div class="success-box">
            <div class="success-icon"><i class="ph ph-check"></i></div>
            <h2>Order Confirmed!</h2>
            <p>Thank you for shopping with Recliners India. Your luxury seating will be prepared soon.</p>
            <a href="../index.html" class="btn btn-primary mt-4">Return Home</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module">
        import { cart } from '../assets/js/cart.js';

        $(document).ready(function() {
            function renderCheckoutSummary() {
                const items = cart.items;
                const list = $('#checkoutItemsList');
                list.empty();

                items.forEach(item => {
                    list.append(`
                        <div class="checkout-item">
                            <div class="item-img-wrapper">
                                <img src="${item.image}" alt="">
                                <span class="item-qty-badge">${item.quantity}</span>
                            </div>
                            <div class="item-info">
                                <h5>${item.title}</h5>
                                <p>${item.color}</p>
                            </div>
                            <div class="item-price">
                                ₹${(item.price * item.quantity).toLocaleString('en-IN')}
                            </div>
                        </div>
                    `);
                });

                const totals = cart.getTotals();
                $('#checkoutSubtotal').text('₹' + totals.subtotal.toLocaleString('en-IN'));
                $('#checkoutShipping').text(totals.shipping === 0 ? 'Free' : '₹' + totals.shipping.toLocaleString('en-IN'));
                $('#checkoutTotal').text('₹' + totals.grandTotal.toLocaleString('en-IN'));
            }

            renderCheckoutSummary();

            // Mock Checkout Process
            $('#checkoutForm').on('submit', function(e) {
                e.preventDefault();
                
                const btn = $(this).find('button[type="submit"]');
                const origText = btn.html();
                btn.html('<i class="ph ph-spinner ph-spin"></i> Processing...');
                btn.prop('disabled', true);

                setTimeout(() => {
                    cart.clearCart(); // Empty cart on success
                    $('#successModal').css('display', 'flex');
                    if (typeof gsap !== 'undefined') {
                        gsap.from('.success-box', { scale: 0.8, opacity: 0, duration: 0.5, ease: 'back.out(1.5)' });
                    }
                }, 2000);
            });
        });
    </script>
<script src="../assets/js/theme.js"></script>
</body>
</html>

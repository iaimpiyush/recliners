<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | Amber Recliners</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Theme Script (Inline to prevent FOUC) -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    <header class="main-header" style="padding: 20px 0; border-bottom: 1px solid var(--border-light);">
        <div class="container text-center">
            <a href="../index.html">
                <img src="../assets/images/cropped-Recliners-India-Black.png" alt="Recliners India Logo" style="height: 40px;">
            </a>
        </div>
    </header>
    <div class="container section-padding text-center">
        <h2>Your Wishlist</h2>
        <p style="color: var(--text-gray); margin-top: 16px;">Coming Soon. You will be able to save your favorite recliners here.</p>
        <a href="shop.html" class="btn btn-primary mt-4" style="margin-top: 32px;">Back to Shop</a>
    </div>
<script src="../assets/js/theme.js"></script>
</body>
</html>

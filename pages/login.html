<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Amber Recliners</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 40px; background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); text-align: center; }
        .auth-container h2 { font-family: var(--font-serif); margin-bottom: 24px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-light); border-radius: var(--radius-md); outline: none; }
        .form-group input:focus { border-color: var(--primary-color); }
    </style>

    <!-- Theme Script (Inline to prevent FOUC) -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body class="bg-light">
    <div class="auth-container">
        <a href="../index.html"><img src="../assets/images/netflix-logo-png-2582.png" alt="Logo" style="height: 40px; margin-bottom: 32px;"></a>
        <h2>Welcome Back</h2>
        <form action="../index.html">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="width: 100%;">Sign In</button>
        </form>
        <p style="margin-top: 24px; color: var(--text-gray);">Don't have an account? <a href="register.html" class="text-primary">Create one</a></p>
    </div>
<script src="../assets/js/theme.js"></script>
</body>
</html>
